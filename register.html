<html lang="en">

    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .auth-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
      }
      .auth-container {
        max-width: 65rem;
        width: 100%;
        padding: 4rem;
        background: #ffffff;
        border-radius: 2rem;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 3.5rem;
      }
      .auth-header h2 {
        font-size: 3.2rem;
        color: var(--buttonColor);
        margin-bottom: 1rem;
        font-weight: 800;
      }
      .auth-header p {
        font-size: 1.6rem;
        color: #666;
      }
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        position: relative;
      }
      .form-group.full-width {
        grid-column: span 2;
      }
      .form-group label {
        font-weight: 600;
        font-size: 1.5rem;
        color: var(--buttonColor);
      }
      .form-group input {
        padding: 1.4rem 1.6rem;
        border: 2px solid #edf2f7;
        border-radius: 1.2rem;
        font-size: 1.6rem;
        transition: all 0.3s ease;
        background: #f8fafc;
      }
      .form-group input:focus {
        border-color: var(--main-color);
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 4px rgba(83, 91, 242, 0.1);
      }
      .password-toggle {
        position: absolute;
        right: 1.6rem;
        top: 4.2rem;
        cursor: pointer;
        color: #a0aec0;
        font-size: 1.8rem;
        transition: color 0.3s;
      }
      .password-toggle:hover {
        color: var(--main-color);
      }
      .address-title {
        grid-column: span 2;
        font-size: 2rem;
        font-weight: 700;
        color: var(--buttonColor);
        margin-top: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #edf2f7;
      }
      .auth-btn {
        width: 100%;
        padding: 1.6rem;
        background: var(--main-color);
        color: white;
        border: none;
        border-radius: 1.2rem;
        font-size: 1.8rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 2rem;
        box-shadow: 0 4px 6px rgba(83, 91, 242, 0.2);
      }
      .auth-btn:hover {
        background: #4349d8;
        transform: translateY(-2px);
        box-shadow: 0 7px 14px rgba(83, 91, 242, 0.3);
      }
      .auth-link {
        text-align: center;
        margin-top: 3rem;
        font-size: 1.6rem;
        color: #666;
      }
      .auth-link a {
        color: var(--main-color);
        font-weight: 700;
        text-decoration: none;
      }
      .auth-link a:hover {
        text-decoration: underline;
      }
      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .form-group.full-width {
          grid-column: span 1;
        }
        .address-title {
          grid-column: span 1;
        }
      }
    </style>
